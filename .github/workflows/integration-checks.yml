name: Integration - start servers & run checks

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  run-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: 'npm'

      - name: Make scripts executable
        run: chmod +x tools/run_all_checks.sh

      - name: Run full checks
        # runs the script which starts the backend, builds & serves frontend, runs checks, then cleans up
        run: |
          ./tools/run_all_checks.sh
