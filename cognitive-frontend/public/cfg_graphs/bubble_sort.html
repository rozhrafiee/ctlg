<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CFG — bubble_sort</title>
  <link rel="stylesheet" href="cfg-shared.css" />
</head>
<body>
<div class="wrap">
  <header>
    <h1>گراف جریان کنترل — bubble_sort</h1>
    <p>sorting.py</p>
  </header>
  <nav><a href="index.html">فهرست</a></nav>

  <section>
    <div class="cfg"><div id="cfg-svg"></div></div>
    <table class="node-table">
      <thead><tr><th>نود</th><th>کد</th></tr></thead>
      <tbody>
        <tr><td>BS1</td><td>arr = list(items); n = len(arr)</td></tr>
        <tr><td>BS2</td><td>if n &lt;= 1</td></tr>
        <tr><td>BS3</td><td>return arr (خروج زود)</td></tr>
        <tr><td>BS4</td><td>for i in range(n)</td></tr>
        <tr><td>BS5</td><td>swapped = False</td></tr>
        <tr><td>BS6</td><td>for j in range(0, n-i-1)</td></tr>
        <tr><td>BS7</td><td>if _should_swap(...)</td></tr>
        <tr><td>BS8</td><td>swap arr[j], arr[j+1]</td></tr>
        <tr><td>BS9</td><td>if not swapped: break</td></tr>
        <tr><td>BS10</td><td>return arr</td></tr>
      </tbody>
    </table>
  </section>
</div>
<script src="cfg-graph.js"></script>
<script>
CFGGraph.render('cfg-svg', {
  id: 'bs', width: 780, height: 720,
  nodes: [
    { id: 'BS1', type: 'start', x: 280, y: 10, w: 220, h: 44, lines: ['BS1: arr=list(items); n=len(arr)'] },
    { id: 'BS2', type: 'decision', x: 330, y: 68, w: 120, h: 60, lines: ['BS2: n <= 1 ?'] },
    { id: 'BS3', type: 'return', x: 60, y: 74, w: 140, h: 44, lines: ['BS3: return arr'] },
    { id: 'BS4', type: 'decision', x: 330, y: 148, w: 120, h: 60, lines: ['BS4: i < n ?'] },
    { id: 'BS5', type: 'process', x: 280, y: 228, w: 220, h: 44, lines: ['BS5: swapped = False'] },
    { id: 'BS6', type: 'decision', x: 330, y: 288, w: 120, h: 60, lines: ['BS6: j < n-i-1 ?'] },
    { id: 'BS7', type: 'decision', x: 330, y: 368, w: 120, h: 60, lines: ['BS7: _should_swap ?'] },
    { id: 'BS8', type: 'process', x: 530, y: 376, w: 110, h: 44, lines: ['BS8: swap'] },
    { id: 'BS9', type: 'decision', x: 330, y: 448, w: 120, h: 60, lines: ['BS9: not swapped ?'] },
    { id: 'BS10', type: 'return', x: 280, y: 530, w: 220, h: 44, lines: ['BS10: return arr'] },
  ],
  edges: [
    { from: 'BS1', to: 'BS2' },
    { from: 'BS2', to: 'BS3', fromSide: 'left', toSide: 'right', kind: 'T' },
    { from: 'BS2', to: 'BS4', kind: 'F' },
    { from: 'BS4', to: 'BS5', kind: 'T' },
    { from: 'BS4', to: 'BS10', kind: 'F', fromSide: 'left', toSide: 'left', waypoints: [{ x: 40, y: 178 }, { x: 40, y: 552 }] },
    { from: 'BS5', to: 'BS6' },
    { from: 'BS6', to: 'BS7', kind: 'T' },
    { from: 'BS6', to: 'BS9', kind: 'F' },
    { from: 'BS7', to: 'BS8', fromSide: 'right', toSide: 'left', kind: 'T' },
    { from: 'BS7', to: 'BS6', kind: 'F', fromSide: 'left', toSide: 'left', waypoints: [{ x: 260, y: 398 }, { x: 260, y: 318 }], note: 'next j' },
    { from: 'BS8', to: 'BS6', fromSide: 'bottom', toSide: 'right', waypoints: [{ x: 585, y: 440 }, { x: 585, y: 318 }] },
    { from: 'BS9', to: 'BS10', kind: 'T', fromSide: 'left', toSide: 'left', waypoints: [{ x: 200, y: 478 }] },
    { from: 'BS9', to: 'BS4', kind: 'F', fromSide: 'right', toSide: 'right', waypoints: [{ x: 500, y: 478 }, { x: 500, y: 178 }], note: 'i++' },
  ],
});
</script>
</body>
</html>
